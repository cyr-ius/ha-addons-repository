---
name: Build & publish LLM Wrapper add-on images

on:
  push:
    branches:
      - main
    tags:
      - "llm-[0-9]+.[0-9]+.[0-9]+"
    paths:
      - "ha-llm-addon/**"
      - ".github/workflows/build-llm.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ha-llm-addon/**"
      - ".github/workflows/build-llm.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (e.g. new_ollama_release)"
        required: false
        default: ""
      ollama_version:
        description: "Ollama version that triggered this build"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/ha-llm-wrapper

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19

          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ha-llm-addon
          file: ha-llm-addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          cache-from: type=gha,scope=llm-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=llm-${{ matrix.arch }}

  manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve manifest tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push manifest
        run: |
          TAG=${{ steps.tag.outputs.value }}
          MANIFEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${TAG}"
          AMD64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${TAG}"
          AARCH64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-aarch64:${TAG}"

          docker buildx imagetools create \
            --tag "${MANIFEST}" \
            "${AMD64}" \
            "${AARCH64}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.value }}"
