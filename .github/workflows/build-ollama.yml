---
name: Build & publish Ollama add-on images

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
    paths:
      - "ha-ollama-addon/**"
      - ".github/workflows/build-ollama.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ha-ollama-addon/**"
      - ".github/workflows/build-ollama.yml"
  workflow_dispatch:
    inputs:
      ollama_version:
        description: "Ollama version to embed"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/ha-ollama
  DEFAULT_OLLAMA_VERSION: "0.24.0"

jobs:
  resolve-version:
    name: Resolve Ollama version
    runs-on: ubuntu-latest
    outputs:
      ollama_version: ${{ steps.version.outputs.value }}

    steps:
      - name: Determine Ollama version
        id: version
        run: |
          VERSION="${{ inputs.ollama_version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${{ vars.OLLAMA_VERSION }}"
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="${{ env.DEFAULT_OLLAMA_VERSION }}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Ollama version: $VERSION"

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: resolve-version
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:latest

          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=ollama-${{ needs.resolve-version.outputs.ollama_version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ha-ollama-addon
          file: ha-ollama-addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            OLLAMA_VERSION=${{ needs.resolve-version.outputs.ollama_version }}
          cache-from: type=gha,scope=ollama-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ollama-${{ matrix.arch }}

  manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve manifest tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push manifest
        run: |
          TAG=${{ steps.tag.outputs.value }}
          MANIFEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${TAG}"
          AMD64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${TAG}"
          AARCH64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-aarch64:${TAG}"

          docker buildx imagetools create \
            --tag "${MANIFEST}" \
            "${AMD64}" \
            "${AARCH64}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.value }}"

  notify-wrapper:
    name: Trigger LLM Wrapper rebuild
    runs-on: ubuntu-latest
    needs: manifest
    if: github.ref_type == 'tag' && github.event_name != 'pull_request'

    steps:
      - name: Dispatch build event to LLM Wrapper workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/workflows/build-llm.yml/dispatches \
            -f ref=main \
            -f "inputs[reason]=new_ollama_release" \
            -f "inputs[ollama_version]=${{ github.ref_name }}"
