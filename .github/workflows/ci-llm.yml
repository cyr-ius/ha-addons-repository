---
name: CI LLM Wrapper — lint & validate

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
    paths:
      - "ha-llm-addon/**"
      - ".github/workflows/ci-llm.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ha-llm-addon/**"
      - ".github/workflows/ci-llm.yml"

concurrency:
  group: ci-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Python (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r ha-llm-addon/requirements.txt

      - name: Run Ruff linter
        run: ruff check ha-llm-addon/app/ --config ha-llm-addon/ruff.toml --output-format=github

      - name: Run Ruff formatter check
        run: ruff format ha-llm-addon/app/ --config ha-llm-addon/ruff.toml --check

  validate-config:
    name: Validate config.yaml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate config.yaml structure
        run: |
          python - <<'EOF'
          import yaml
          import sys
          import re

          REQUIRED_FIELDS = [
              "name", "description", "version", "slug",
              "arch", "options", "schema",
          ]

          with open("ha-llm-addon/config.yaml") as f:
              config = yaml.safe_load(f)

          errors = []

          for field in REQUIRED_FIELDS:
              if field not in config:
                  errors.append(f"Missing required field: '{field}'")

          if "arch" in config:
              if not isinstance(config["arch"], list) or len(config["arch"]) == 0:
                  errors.append("'arch' must be a non-empty list")

          version = config.get("version", "")
          if not re.match(r"^\d+\.\d+\.\d+", str(version)):
              errors.append(f"'version' must follow semver (got: {version!r})")

          options_keys = set(config.get("options", {}).keys())
          schema_keys  = set(config.get("schema",  {}).keys())
          missing_in_schema  = options_keys - schema_keys
          missing_in_options = schema_keys  - options_keys

          if missing_in_schema:
              errors.append(f"Keys in 'options' but missing in 'schema': {missing_in_schema}")
          if missing_in_options:
              errors.append(f"Keys in 'schema' but missing in 'options': {missing_in_options}")

          if errors:
              print("config.yaml validation FAILED:")
              for e in errors:
                  print(f"  x {e}")
              sys.exit(1)

          print(f"config.yaml OK — version={version}, arch={config['arch']}")
          EOF

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    if: hashFiles('ha-llm-addon/tests/**/*.py') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ha-llm-addon/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          HA_LLM_OLLAMA_HOST: "http://localhost:11434"
          HA_LLM_HA_URL: "http://localhost:8123"
          HA_LLM_HA_TOKEN: "test-token"
        run: pytest ha-llm-addon/tests/ -v --tb=short
