---
name: Release LLM Wrapper — bump version & tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump ${{ inputs.bump }} version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Compute next version
        id: version
        run: |
          python - <<'PYEOF'
          import yaml, re, os

          with open("ha-llm-addon/config.yaml") as f:
              config = yaml.safe_load(f)

          current = str(config["version"])
          m = re.match(r"^(\d+)\.(\d+)\.(\d+)", current)
          if not m:
              raise ValueError(f"Cannot parse version: {current!r}")

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          bump = os.environ["BUMP"]

          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          print(f"Bumping {current} -> {new_version} ({bump})")

          with open("ha-llm-addon/config.yaml") as f:
              raw = f.read()

          updated = re.sub(
              r"^(version:\s*)['\"]?" + re.escape(current) + r"['\"]?",
              rf"\g<1>{new_version}",
              raw,
              flags=re.MULTILINE,
          )

          with open("ha-llm-addon/config.yaml", "w") as f:
              f.write(updated)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"current={current}\n")
              out.write(f"new={new_version}\n")
          PYEOF
        env:
          BUMP: ${{ inputs.bump }}

      - name: Verify config.yaml after bump
        run: |
          python - <<'EOF'
          import yaml
          with open("ha-llm-addon/config.yaml") as f:
              config = yaml.safe_load(f)
          print(f"config.yaml version after bump: {config['version']}")
          assert config["version"] == "${{ steps.version.outputs.new }}", "Version mismatch!"
          EOF

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add ha-llm-addon/config.yaml
          git commit -m "chore(llm): bump version to ${{ steps.version.outputs.new }} [${{ inputs.bump }}]"

      - name: Create semver tag (prefixed)
        run: |
          git tag "llm-${{ steps.version.outputs.new }}" \
            -m "LLM Wrapper release ${{ steps.version.outputs.new }}"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin "llm-${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: llm-${{ steps.version.outputs.new }}
          name: "LLM Wrapper v${{ steps.version.outputs.new }}"
          body: |
            ## What's changed

            Version bump: `${{ steps.version.outputs.current }}` -> `${{ steps.version.outputs.new }}` (${{ inputs.bump }})

            Docker images will be available on GHCR once the [build workflow](../../actions/workflows/build-llm.yml) completes.

            ### Install / update

            Add the repository to Home Assistant and install or update the **LLM Wrapper** add-on.

            ```yaml
            image: "ghcr.io/${{ github.repository_owner }}/ha-llm-wrapper-{arch}"
            ```
          generate_release_notes: true
