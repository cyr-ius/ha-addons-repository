---
# Build and push multi-arch Docker images to GitHub Container Registry.
#
# Triggered on:
#   - Every push to `main` (produces a `latest` tag)
#   - Every semver tag  (produces a versioned tag, e.g. `1.2.3`)
#   - Pull requests     (build only, no push — smoke-test the Dockerfile)
#
# Architecture matrix:
#   amd64   → linux/amd64   (most VMs / x86 NUCs)
#   aarch64 → linux/arm64   (Raspberry Pi 4/5, Apple Silicon, ARM servers)
#
# Home Assistant base images (ghcr.io/home-assistant/{arch}-base-python):
#   Each arch uses the correct HA base image so the Supervisor integration
#   (s6-overlay, bashio, etc.) is available out of the box.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   None — GITHUB_TOKEN is injected automatically by Actions.
#
# Package visibility:
#   The image is pushed to ghcr.io/<owner>/ha-llm-wrapper-<arch>.
#   Make the package public in your GitHub profile → Packages settings
#   so Home Assistant users can pull it without authentication.

name: Build & publish add-on images

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # semver tags: 1.0.0, 2.3.1, …
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Image name without the arch suffix — arch is appended per matrix job.
  IMAGE_BASE: ${{ github.repository_owner }}/ha-llm-wrapper

jobs:
  # --------------------------------------------------------------------------
  # Determine metadata (version, tags) once, share across arch jobs.
  # --------------------------------------------------------------------------
  metadata:
    name: Resolve image metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64
          tags: |
            # semver tag → versioned image (e.g. 1.2.3)
            type=semver,pattern={{version}}
            # main branch → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # PR → pr-<number> (never pushed, useful for log inspection)
            type=ref,event=pr

  # --------------------------------------------------------------------------
  # Build one image per architecture.
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: metadata
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false   # Let both arches finish so we see all errors at once.
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            # HA Python base image for amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19

          - arch: aarch64
            runner: ubuntu-latest   # QEMU emulation — native ARM runner optional
            platform: linux/arm64
            # HA Python base image for aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner build arm64 images transparently.
      - name: Set up QEMU (cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      # Buildx is required for multi-platform builds and cache exports.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only push on non-PR events — PRs only build to validate the Dockerfile.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the final image name for this specific architecture.
      - name: Set image name
        id: image
        run: |
          echo "name=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      # Resolve tags for this arch image.
      - name: Extract per-arch Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          # Use GitHub Actions cache to speed up layer rebuilds.
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      # Export the image digest so the manifest job can reference it.
      - name: Export image digest
        if: github.event_name != 'pull_request'
        id: digest
        run: |
          # docker/build-push-action writes the digest to $GITHUB_OUTPUT
          echo "digest=${{ steps.build-push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Create / update a multi-arch manifest list pointing to both arch images.
  # Clients (docker pull, HA Supervisor) automatically pick the right arch.
  # --------------------------------------------------------------------------
  manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    # Only run when both arch builds succeeded on a real push (not a PR).
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Resolve the version tag (same logic as build jobs).
      - name: Resolve version tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      # The manifest image (no arch suffix) is what config.yaml's `image`
      # field should ultimately point to.  HA Supervisor pulls by arch tag,
      # but having a manifest list is good practice for direct docker pulls.
      - name: Create and push manifest list
        run: |
          TAG=${{ steps.tag.outputs.value }}
          MANIFEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${TAG}"
          AMD64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${TAG}"
          AARCH64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-aarch64:${TAG}"

          echo "Creating manifest: ${MANIFEST}"
          echo "  amd64   → ${AMD64}"
          echo "  aarch64 → ${AARCH64}"

          docker buildx imagetools create \
            --tag "${MANIFEST}" \
            "${AMD64}" \
            "${AARCH64}"

      # Also tag `latest` when a semver tag is pushed.
      - name: Tag manifest as latest (on semver release)
        if: github.ref_type == 'tag'
        run: |
          MANIFEST_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:latest"
          MANIFEST_VER="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ github.ref_name }}"

          docker buildx imagetools create \
            --tag "${MANIFEST_LATEST}" \
            "${MANIFEST_VER}"

      - name: Inspect final manifest
        run: |
          TAG=${{ steps.tag.outputs.value }}
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${TAG}"
