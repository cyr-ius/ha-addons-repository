---
# Automated release workflow.
#
# Trigger: manual dispatch from the GitHub Actions UI (Actions → Release).
#
# What it does:
#   1. Reads the current version from config.yaml
#   2. Computes the next version (patch / minor / major bump)
#   3. Updates config.yaml with the new version
#   4. Commits the change to main
#   5. Creates a git tag  →  triggers build.yml automatically
#
# Required permissions: the GITHUB_TOKEN must have write access to contents.
# Go to Settings → Actions → General → Workflow permissions → Read and write.

name: Release — bump version & tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch   # 1.0.0 → 1.0.1  (bug fixes)
          - minor   # 1.0.0 → 1.1.0  (new features, backward-compatible)
          - major   # 1.0.0 → 2.0.0  (breaking changes)

jobs:
  release:
    name: Bump ${{ inputs.bump }} version
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commit + tag

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for tag operations
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Compute next version
        id: version
        run: |
          python - <<'PYEOF'
          import yaml, re, os

          with open("config.yaml") as f:
              config = yaml.safe_load(f)

          current = str(config["version"])
          m = re.match(r"^(\d+)\.(\d+)\.(\d+)", current)
          if not m:
              raise ValueError(f"Cannot parse version: {current!r}")

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          bump = os.environ["BUMP"]

          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          print(f"Bumping {current} → {new_version} ({bump})")

          # Write back to config.yaml (preserve all other content)
          with open("config.yaml") as f:
              raw = f.read()

          updated = re.sub(
              r"^(version:\s*)['\"]?" + re.escape(current) + r"['\"]?",
              rf"\g<1>{new_version}",
              raw,
              flags=re.MULTILINE,
          )

          with open("config.yaml", "w") as f:
              f.write(updated)

          # Expose to subsequent steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"current={current}\n")
              out.write(f"new={new_version}\n")
          PYEOF
        env:
          BUMP: ${{ inputs.bump }}

      - name: Verify config.yaml after bump
        run: |
          python - <<'EOF'
          import yaml
          with open("config.yaml") as f:
              config = yaml.safe_load(f)
          print(f"config.yaml version after bump: {config['version']}")
          assert config["version"] == "${{ steps.version.outputs.new }}", "Version mismatch!"
          EOF

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add config.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [${{ inputs.bump }}]"

      - name: Create semver tag
        run: |
          git tag "${{ steps.version.outputs.new }}" \
            -m "Release ${{ steps.version.outputs.new }}"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new }}
          name: "v${{ steps.version.outputs.new }}"
          body: |
            ## What's changed

            Version bump: `${{ steps.version.outputs.current }}` → `${{ steps.version.outputs.new }}` (${{ inputs.bump }})

            Docker images will be available on GHCR once the [build workflow](../../actions/workflows/build.yml) completes.

            ### Install / update

            Add the repository to Home Assistant and install or update the **LLM Wrapper** add-on.
            The Supervisor will automatically pull the new image.

            ```yaml
            # config.yaml image reference
            image: "ghcr.io/${{ github.repository_owner }}/ha-llm-wrapper-{arch}"
            ```
          generate_release_notes: true
