# Ruff configuration — aligned with Portalcrane development standards (PEP 8, Python 3.12).
# https://docs.astral.sh/ruff/

target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names)
    "I",    # isort (import order)
    "N",    # pep8-naming
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # flake8-bugbear (likely bugs)
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "ANN",  # flake8-annotations (type hints)
    "ASYNC",# flake8-async (async best practices)
    "LOG",  # flake8-logging
]

ignore = [
    "ANN101",  # Missing type annotation for `self`
    "ANN102",  # Missing type annotation for `cls`
    "ANN401",  # Allow Any type (needed for tool call dicts)
]

[lint.per-file-ignores]
# Tests can use assert and skip some type hints
"tests/**/*.py" = ["ANN", "S101"]

[lint.isort]
known-first-party = ["app"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
