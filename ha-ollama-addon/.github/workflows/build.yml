---
# Build and push the Ollama add-on multi-arch images to GHCR.
#
# Key difference from the LLM Wrapper workflow:
#   The Ollama binary is architecture-specific and downloaded at build time.
#   Docker Buildx sets TARGETARCH automatically (amd64 / arm64), which the
#   Dockerfile uses to pick the correct release asset from GitHub.
#
# OLLAMA_VERSION can be overridden at workflow dispatch to upgrade Ollama
# without changing the Dockerfile.

name: Build & publish Ollama add-on images

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ollama_version:
        description: "Ollama version to embed (e.g. 0.3.14)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/ha-ollama
  # Default Ollama version — overridden by workflow_dispatch input or
  # by the OLLAMA_VERSION env var set in repository variables.
  DEFAULT_OLLAMA_VERSION: "0.3.14"

jobs:
  # --------------------------------------------------------------------------
  # Resolve the Ollama version to embed.
  # --------------------------------------------------------------------------
  resolve-version:
    name: Resolve Ollama version
    runs-on: ubuntu-latest
    outputs:
      ollama_version: ${{ steps.version.outputs.value }}

    steps:
      - name: Determine Ollama version
        id: version
        run: |
          # Priority: workflow_dispatch input > repository variable > default
          VERSION="${{ inputs.ollama_version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${{ vars.OLLAMA_VERSION }}"
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="${{ env.DEFAULT_OLLAMA_VERSION }}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Ollama version: $VERSION"

  # --------------------------------------------------------------------------
  # Build one image per architecture.
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: resolve-version
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:latest

          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Include Ollama version in the tag for traceability
            type=raw,value=ollama-${{ needs.resolve-version.outputs.ollama_version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            OLLAMA_VERSION=${{ needs.resolve-version.outputs.ollama_version }}
          # Separate cache scope per arch — avoids cross-contamination
          cache-from: type=gha,scope=ollama-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ollama-${{ matrix.arch }}

      # Verify the binary works inside the built image
      - name: Smoke-test — ollama binary is executable
        if: matrix.arch == 'amd64'   # skip arm64: QEMU too slow for this
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            $(echo "${{ steps.meta.outputs.tags }}" | head -1) \
            ollama --version

  # --------------------------------------------------------------------------
  # Multi-arch manifest
  # --------------------------------------------------------------------------
  manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve manifest tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push manifest
        run: |
          TAG=${{ steps.tag.outputs.value }}
          MANIFEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${TAG}"
          AMD64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-amd64:${TAG}"
          AARCH64="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-aarch64:${TAG}"

          docker buildx imagetools create \
            --tag "${MANIFEST}" \
            "${AMD64}" \
            "${AARCH64}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.value }}"

  # --------------------------------------------------------------------------
  # Notify the LLM Wrapper repository to rebuild when a new Ollama is out.
  # Requires a PAT secret named CROSS_REPO_TOKEN with workflow:write scope.
  # --------------------------------------------------------------------------
  notify-wrapper:
    name: Trigger LLM Wrapper rebuild
    runs-on: ubuntu-latest
    needs: manifest
    if: github.ref_type == 'tag' && github.event_name != 'pull_request'

    steps:
      - name: Dispatch build event to LLM Wrapper repo
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          # Only runs if the secret is set — fails silently otherwise
          if [[ -z "$GH_TOKEN" ]]; then
            echo "CROSS_REPO_TOKEN not set — skipping cross-repo dispatch"
            exit 0
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository_owner }}/ha-llm-addon/actions/workflows/build.yml/dispatches \
            -f ref=main \
            -f "inputs[reason]=new_ollama_release" \
            -f "inputs[ollama_version]=${{ github.ref_name }}"
